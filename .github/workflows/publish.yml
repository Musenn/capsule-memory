name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev,server]"

      - name: Run unit tests
        env:
          CAPSULE_MOCK_EXTRACTOR: "true"
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          CAPSULE_MOCK_EXTRACTOR: "true"
        run: pytest tests/integration/test_full_workflow.py tests/integration/test_rest_api.py tests/integration/test_mcp_server.py -v --tb=short

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
