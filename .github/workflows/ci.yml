name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint
        run: ruff check capsule_memory/ tests/

      - name: Type check
        run: mypy capsule_memory/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests (REST API)
        run: pytest tests/integration/test_rest_api.py -v --tb=short

      - name: Run integration tests (full workflow)
        env:
          CAPSULE_MOCK_EXTRACTOR: "true"
        run: pytest tests/integration/test_full_workflow.py -v --tb=short

      - name: Run integration tests (MCP server)
        env:
          CAPSULE_MOCK_EXTRACTOR: "true"
        run: pytest tests/integration/test_mcp_server.py -v --tb=short
